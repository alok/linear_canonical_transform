[project]
name = "lct-activation"
version = "0.1.0"
description = "Standalone PyTorch Linear Canonical Transform layers and activations."
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "numpy>=1.26",
    "torch>=2.2",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.3.5",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/lct_activation"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.uv]
package = true
