name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run tests
        run: uv run pytest -q

      - name: Run install doctor
        run: uv run lct-doctor --result-dir paper/results --require-results

      - name: Run examples
        run: |
          uv run python examples/quickstart.py
          uv run python examples/property_diagnostics.py

      - name: Check property diagnostics CLI
        run: |
          uv run lct-check-properties \
            --length 8 \
            --first-angle-degrees 30 \
            --second-angle-degrees -30 \
            --normalization unitary \
            --unitary-projection
          uv run lct-check-properties \
            --length 8 \
            --first-angle-degrees 30 \
            --second-angle-degrees -30 \
            --discretization spectral-frft
          uv run lct assert-properties \
            --length 8 \
            --first-angle-degrees 30 \
            --second-angle-degrees -30
          uv run lct sweep-properties \
            --length 8 16 \
            --angle-pair 30 -30 \
            --format json \
            | uv run python -m json.tool > /tmp/lct-property-sweep.json

      - name: Check result summary CLI
        run: |
          uv run lct-summarize-results --result-dir paper/results --format json \
            | uv run python -m json.tool > /tmp/lct-summary.json

      - name: Build package
        run: uv build

      - name: Smoke-test built wheel
        run: uv run python scripts/smoke_dist.py

      - name: Verify release metadata
        run: uv run python scripts/verify_release.py --skip-smoke
