name: Release

# Publishes to PyPI via Trusted Publishing (OIDC) - no API token anywhere.
# One-time setup on pypi.org (logged in as the project owner):
#   Account -> Publishing -> "Add a new pending publisher":
#     project:     lct-activation
#     owner/repo:  alok/linear_canonical_transform
#     workflow:    release.yml
#     environment: pypi
# Then publish by tagging: git tag -a v0.1.0 -m "lct-activation 0.1.0"
# and pushing that tag: git push origin v0.1.0

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Install dependencies
        run: uv sync --frozen --extra dev --extra mlx

      - name: Run tests
        run: uv run --frozen pytest -q

      - name: Build distributions
        run: uv build

      - name: Verify release metadata
        run: uv run --frozen python scripts/verify_release.py --check-pypi --tag "$GITHUB_REF_NAME"

      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@v1.14.0
